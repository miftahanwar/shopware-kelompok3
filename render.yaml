services:
  - type: web
    name: shopware
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    plan: free
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_URL
        fromService:
          type: web
          name: shopware
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: shopware-db
          property: connectionString

databases:
  - name: shopware-db
    plan: free
    databaseName: shopware
    user: shopware
